<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bio Explainer</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand" id="brandButton" type="button">Bio Explainer</button>
        <div class="top-actions">
          <button class="nav-button hidden" id="backButton" type="button">← 返回</button>
          <button class="nav-button hidden" id="forwardButton" type="button">→</button>
          <button class="nav-button hidden" id="resetButton" type="button">重置</button>
          <select id="languageSelect" aria-label="语言">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
          <button class="icon-button" id="settingsButton" type="button" aria-label="设置">⚙</button>
        </div>
      </header>

      <main>
        <section class="home-view" id="homeView">
          <div class="gene-mark">◇</div>
          <h1>输入一个物种名，开始探索</h1>
          <form class="search-row" id="searchForm">
            <input id="queryInput" maxlength="100" placeholder="蓝环章鱼" autocomplete="off" />
            <button type="submit">探索</button>
          </form>
          <div class="examples" id="examples">
            <button type="button">雪豹</button>
            <button type="button">枯叶蛙</button>
            <button type="button">帝王蝎</button>
            <button type="button">始祖鸟</button>
          </div>
          <p class="error-line" id="homeError"></p>
        </section>

        <section class="explore-view hidden" id="exploreView">
          <nav class="tabs" id="tabs">
            <button type="button" data-tab="morphology" class="active">🔬 形态</button>
            <button type="button" data-tab="evolution">🌿 进化</button>
            <button type="button" data-tab="ecology">🦁 生态</button>
          </nav>

          <div class="poster-stage">
            <div class="poster-frame" id="posterFrame">
              <img id="posterImage" alt="当前科普海报" />
              <div class="empty-poster" id="emptyPoster">正在等待生成</div>
              <div class="loading-overlay hidden" id="loadingOverlay">正在生成…</div>
              <span class="ripple hidden" id="ripple"></span>
            </div>
          </div>

          <p class="caption" id="caption"></p>
          <p class="warning-line" id="factualWarning"></p>
          <p class="error-line" id="exploreError"></p>
          <div class="thumbnail-strip" id="thumbnailStrip"></div>
        </section>
      </main>
    </div>

    <div class="modal hidden" id="settingsModal" role="dialog" aria-modal="true" aria-label="设置">
      <div class="modal-panel">
        <div class="modal-head">
          <strong>设置</strong>
          <button class="icon-button" id="closeSettingsButton" type="button" aria-label="关闭">×</button>
        </div>
        <div class="settings-tabs">
          <button type="button" data-settings-tab="api" class="active">API 配置</button>
          <button type="button" data-settings-tab="prompts">提示词编辑</button>
        </div>

        <form class="settings-section" id="apiSettings">
          <label>
            <span>LLM 提供商</span>
            <select id="llmProvider">
              <option value="deepseek">DeepSeek</option>
              <option value="openai">OpenAI</option>
              <option value="claude">Claude</option>
            </select>
          </label>
          <label>
            <span>LLM API Key</span>
            <input id="llmApiKey" type="password" autocomplete="off" />
          </label>
          <label>
            <span>Base URL</span>
            <input id="llmBaseUrl" autocomplete="off" />
          </label>
          <label>
            <span>LLM 模型</span>
            <input id="llmModel" autocomplete="off" />
          </label>
          <label>
            <span>OpenAI API Key（生图）</span>
            <input id="openaiApiKey" type="password" autocomplete="off" />
          </label>
          <label>
            <span>生图 Base URL</span>
            <input id="imageBaseUrl" autocomplete="off" placeholder="留空使用官方 OpenAI API，可填写兼容接口 Base URL" />
          </label>
          <label>
            <span>生图模型</span>
            <input id="imageModel" autocomplete="off" placeholder="gpt-image-1" />
          </label>
          <label>
            <span>分辨率</span>
            <select id="imageResolution">
              <option value="1k">1k</option>
              <option value="2k">2k</option>
              <option value="4k">4k</option>
            </select>
          </label>
          <label>
            <span>生图质量</span>
            <select id="imageQuality">
              <option value="medium">medium</option>
              <option value="high">high</option>
              <option value="low">low</option>
              <option value="auto">auto</option>
            </select>
          </label>
          <div class="form-actions">
            <button type="submit">保存配置</button>
            <span id="configStatus"></span>
          </div>
        </form>

        <section class="settings-section hidden" id="promptSettings">
          <div class="prompt-editor">
            <div class="prompt-list" id="promptList"></div>
            <textarea id="promptText" spellcheck="false"></textarea>
          </div>
          <div class="form-actions">
            <button id="restorePromptButton" type="button">恢复默认</button>
            <button id="savePromptButton" type="button">保存提示词</button>
            <span id="promptStatus"></span>
          </div>
        </section>
      </div>
    </div>

    <script src="/static/app.js?v=20260427-cache2"></script>
  </body>
</html>
